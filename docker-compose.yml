version: '3.9'

services:

  # ============================================
  # 🐘 PHP 8.4 + Symfony
  # ============================================
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: cmf_php
    volumes:
      - ./symfony:/var/www/symfony
    networks:
      - cmf_network
    depends_on:
      - database
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://root:${MYSQL_ROOT_PASSWORD}@database:3306/${MYSQL_DATABASE}?serverVersion=8.0&charset=utf8mb4"

  # ============================================
  # 🌐 Nginx (serveur web)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: cmf_nginx
    ports:
      - "8000:80"
    volumes:
      - ./symfony:/var/www/symfony
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cmf_network
    depends_on:
      - php

  # ============================================
  # 🗄️ MySQL 8.0 (MariaDB)
  # ============================================
  database:
    image: mariadb:10.11
    container_name: cmf_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - cmf_db_data:/var/lib/mysql
    networks:
      - cmf_network

  # ============================================
  # 🛠️ phpMyAdmin
  # ============================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: cmf_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - cmf_network
    depends_on:
      - database

networks:
  cmf_network:
    driver: bridge

volumes:
  cmf_db_data:
    driver: local
