services:
    # ============================================
    # 🐘 PHP 8.4-FPM
    # Exécute le code Symfony via PHP-FPM.
    # L'image est construite depuis le Dockerfile local.
    # Le dossier CMF/ (racine du projet) est monté dans
    # /var/www/html à l'intérieur du conteneur.
    # ============================================
    php:
        build:
            context: . # Le Dockerfile se trouve à la racine de CMF/
            dockerfile: Dockerfile
        container_name: cmf_php
        volumes:
            - .:/var/www/html # Montage du projet : CMF/ → /var/www/html (conteneur)
        networks:
            - app_network
        depends_on:
            - database # PHP démarre après la base de données

    # ============================================
    # 🌐 Nginx (serveur web)
    # Reçoit les requêtes HTTP sur le port 8080 (hôte)
    # et les transmet à PHP-FPM sur le port 9000 (interne).
    # Sert aussi directement les fichiers statiques (CSS, JS, images).
    #
    # Port : 8080 (hôte) → 80 (conteneur)
    # ============================================
    nginx:
        image: nginx:alpine # Image légère basée sur Alpine Linux
        container_name: cmf_nginx
        ports:
            - "8080:80" # Accès via http://localhost:8080
        volumes:
            - .:/var/www/html # Même dossier que PHP (pour servir les assets)
            - ./default.conf:/etc/nginx/conf.d/default.conf # Configuration du virtual host
        networks:
            - app_network
        depends_on:
            - php # Nginx démarre après PHP-FPM

    # ============================================
    # 🗄️ MySQL 8.0
    # Base de données relationnelle pour Symfony.
    # Les données sont persistées dans le volume "app_mysql_data"
    # afin de survivre aux redémarrages des conteneurs.
    #
    # Port : 3306 (hôte) → 3306 (conteneur)
    # Connexion depuis l'hôte : 127.0.0.1:3306
    # ============================================
    database:
        image: mysql:8.0
        container_name: cmf_database
        environment:
            MYSQL_ROOT_PASSWORD: root # Mot de passe du superutilisateur MySQL (root)
            MYSQL_DATABASE: app # Nom de la base créée automatiquement au démarrage
            MYSQL_USER: app # Utilisateur dédié à l'application Symfony
            MYSQL_PASSWORD: app # Mot de passe de cet utilisateur
            # ⚠️ En production, utiliser des variables d'environnement via un fichier .env
        ports:
            - "3306:3306"
        volumes:
            - app_mysql_data:/var/lib/mysql # Données MySQL persistées dans un volume nommé
        networks:
            - app_network

    # ============================================
    # 🛠️ phpMyAdmin
    # Interface graphique web pour administrer MySQL.
    # Se connecte au service "database" via le réseau interne Docker.
    #
    # Port : 8081 (hôte) → 80 (conteneur)
    # Accès via : http://localhost:8081
    # ============================================
    phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        container_name: cmf_phpmyadmin
        ports:
            - "8081:80" # Accès via http://localhost:8081
        environment:
            PMA_HOST: database # Nom du service MySQL dans le réseau Docker
            PMA_PORT: 3306
            PMA_USER: root
            PMA_PASSWORD: root
            # ⚠️ En production, utiliser des secrets Docker ou des variables d'environnement
        networks:
            - app_network
        depends_on:
            - database # phpMyAdmin démarre après MySQL

# ============================================
# Réseau interne partagé entre tous les conteneurs.
# Permet aux services de se joindre par leur nom
# (ex: "php", "database", "nginx") sans exposer les ports.
# ============================================

networks:
    app_network:
        driver: bridge

# ============================================
# Volume nommé pour persister les données MySQL.
# Les données survivent aux `docker-compose down`.
# Pour tout effacer : docker volume rm app_mysql_data
# ============================================
volumes:
    app_mysql_data:
