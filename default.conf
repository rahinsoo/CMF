# ============================================
# Configuration Nginx pour Symfony 7.x
# ============================================
# Ce fichier est monté dans le conteneur Nginx via :
#   ./default.conf:/etc/nginx/conf.d/default.conf
# Il configure le virtual host HTTP sur le port 80.
# ============================================

server {
    # Nginx écoute sur le port 80 à l'intérieur du conteneur.
    # Le mapping vers l'hôte (ex: 8080:80) est géré par docker-compose.
    listen 80;

    # Nom de domaine accepté. "localhost" suffit en développement local.
    server_name localhost;

    # ============================================
    # Racine des fichiers servis par Nginx.
    # Symfony place son point d'entrée (index.php)
    # dans le dossier /public/ du projet.
    # /var/www/html correspond au montage de CMF/ dans le conteneur.
    # ============================================
    root /var/www/html/public;

    # Fichier servi par défaut si aucun fichier n'est précisé dans l'URL.
    index index.php index.html;

    # ============================================
    # Règle principale de routage Symfony (Front Controller Pattern).
    # 1. Nginx cherche d'abord un fichier réel ($uri)
    # 2. Puis un dossier ($uri/)
    # 3. Sinon, redirige vers index.php (le Front Controller Symfony)
    #    qui se charge du routage interne de l'application.
    # ============================================
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ============================================
    # Traitement des fichiers PHP via PHP-FPM.
    # Nginx n'exécute pas PHP lui-même : il délègue
    # la requête à PHP-FPM via le protocole FastCGI.
    #
    # "php:9000" = service "php" du docker-compose + port FPM par défaut.
    # Seul index.php est autorisé (^/index\.php) pour éviter
    # l'exécution de fichiers PHP ailleurs (sécurité).
    # ============================================
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;

        # Sépare le chemin du script PHP du PATH_INFO
        # Ex : /index.php/foo/bar → script=/index.php, path_info=/foo/bar
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        fastcgi_index index.php;

        # Indique à PHP-FPM le chemin absolu du fichier à exécuter
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Transmet la racine réelle (après résolution des symlinks)
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Charge les paramètres FastCGI standard (REMOTE_ADDR, REQUEST_METHOD, etc.)
        include fastcgi_params;

        # Transmet le PATH_INFO à PHP (utile pour certains frameworks)
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Sécurité : si le fichier n'existe pas physiquement,
        # Nginx retourne 404 plutôt que de transmettre la requête à PHP.
        try_files $uri =404;
    }

    # ============================================
    # Fichiers statiques (assets front-end).
    # Servis directement par Nginx sans passer par PHP,
    # ce qui est beaucoup plus performant.
    #
    # Cache navigateur d'1 an : adapté aux assets versionnés
    # (Webpack Encore / AssetMapper génèrent des noms avec hash).
    # "immutable" indique au navigateur que le fichier ne changera jamais.
    # ============================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Retourne 404 si le fichier n'existe pas (pas de fallback vers PHP)
        try_files $uri =404;
    }

    # ============================================
    # Sécurité : interdit l'accès à tous les fichiers cachés.
    # Protège des fichiers sensibles comme :
    #   .env (variables d'environnement, mots de passe)
    #   .git (historique du code source)
    #   .htaccess
    # ============================================
    location ~ /\. {
        deny all;
        return 404;
    }

    # Fichiers de logs Nginx (accessibles dans le conteneur Nginx)
    error_log  /var/log/nginx/cmf_error.log;
    access_log /var/log/nginx/cmf_access.log;
}
